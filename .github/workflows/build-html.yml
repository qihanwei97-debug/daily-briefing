name: Build Briefing HTML

on:
  push:
    branches: [main]
    paths:
      - 'briefings/**.md'
      - 'tools/md_to_html.py'
      - '.github/workflows/build-html.yml'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: List briefing markdown files (debug)
        run: |
          echo "=== briefings/ directory ==="
          ls -la briefings/ || echo "no briefings dir"
          echo ""
          echo "=== existing html ==="
          ls -la briefings/html/ 2>/dev/null || echo "no html dir yet"

      - name: Convert all briefing .md to .html
        run: |
          set -e
          shopt -s nullglob
          count=0
          for f in briefings/*.md; do
            # Skip files that already have HTML up to date (always reconvert is OK, git diff filters)
            echo "Converting: $f"
            python tools/md_to_html.py "$f"
            count=$((count + 1))
          done
          echo "Total converted: $count"
          echo ""
          echo "=== output html ==="
          ls -la briefings/html/

      - name: Commit and push HTML changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add briefings/html/

          if git diff --staged --quiet; then
            echo "No HTML changes to commit."
          else
            git commit -m "auto: rebuild HTML for briefings"
            git push
            echo "Pushed HTML updates."
          fi
